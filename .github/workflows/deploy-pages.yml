# Deploys the committed dist/ (demo mode — mock data, no SharePoint) to GitHub Pages.
# Runs on every push to the deploy branch or main. Manual run: Actions tab → Run workflow.
name: Deploy demo to GitHub Pages
on:
  push:
    branches:
      - claude/risk-console-deploy-9eek78
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
